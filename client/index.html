

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="/client/style.css">
</head>
<body>
    <header>
        <nav>
            <div>
                <img src="/client/images/logo.png" class="logo" alt="logo">
                <h3>Employee Management</h3>
            </div>

            <ul class="navItems">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>

                <a href="/addEmployee" class="add-btn">Add Employee</a>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1 class="hero-title">One Platform. <br>
                <span class="gradient-word">Complete Workforce Management.</span>
            </h1>
            <p class="hero-description">Manage employees, track attendance, monitor performance,and streamline HR operations from a single dashboard.</p>

        </section>

        <section>

            <div class="search-container">
                <span></span>
                <input type="text" id="searchInput" placeholder="Search by department...">
            </div>

            <div class="tableTitle">
                <h2>Employee Records</h2>
            </div>

            <div class="tableContainer">
                
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="employeeTableBody">
                        <!-- <tr>
                            <td>Jeff Jos</td>
                            <td>jeff@gmail.com</td>
                            <td>Frontend Developer</td>
                            <td>IT</td>
                            <td>$50,00</td>
                            <td><span class="status active">Active</span></td>

                            <td class="actions">
                                <button class="editBtn">Edit</button>
                                <button class="deleteBtn">Delete</button>
                            </td>
                        </tr> -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="/client/js/index.js"></script>
</body>
</html>

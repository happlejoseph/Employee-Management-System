<section class="employee-section">

    <h1 class="employee-title">Edit Employee</h1>
    <p class="employee-subtitle">
        Update employee information and keep records up to date.
    </p>

    <form action="/submit" method="post" class="employee-form">

        <div class="form-grid">

            <input type="text" id="name" name="name" placeholder="Full Name" required>
            <input type="email" id="email" name="email" placeholder="Email Address" required>
            <input type="text" id="role" name="role" placeholder="Role" required>
            <input type="text" id="department" name="department" placeholder="Department" required>
            <input type="number" id="salary" name="salary" placeholder="Salary" required>

            <select name="status" required>
                <option value="" disabled selected>Select Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>

        </div>

        <button type="button" onclick="updateEmployee()" class="employee-btn">
            Update Employee
        </button>

    </form>

</section>

<script src="/client/js/editEmployee.js"></script>
</body>

</html>

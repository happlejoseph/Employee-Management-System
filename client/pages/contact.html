<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/client/style.css">
</head>
<body>
    <header>
        <nav>
            <div>
                <img src="/client/images/logo.png" class="logo" alt="logo">
                <h3>Employee Management</h3>
            </div>

            <ul class="navItems">
                <li><a href="/">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>

                <!-- <a href="" class="add-btn">Add Employee</a> -->
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2 class="contact-title">Contact Us</h2>

            <p class="contact-subtitle">
                Need Help? Reach Out to Us.
            </p>

            <div class="contactForm-container">
            <form action="/contactSubmit" method="post">
                <input type="text" name="name" id="" placeholder="Full Name" required>
                <input type="tel" name="phone" id="" value="+91" placeholder="Phone Number" required>
                <input type="text" name="email" id="" placeholder="Email Address" required>

                <button type="submit">Connect</button>
            </form>
            </div>
        </section>
    </main>
    
</body>
</html>
